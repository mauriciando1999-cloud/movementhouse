<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Movement House | Atleta</title>
    
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
    
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-base: #000000; --bg-surface: #0a0a0a; --bg-card: #121212;
            --accent: #FF5E00; --accent-hover: #e05300; --accent-glow: rgba(255, 94, 0, 0.2);
            --text-main: #ffffff; --text-muted: #888888;
            --border-light: rgba(255, 255, 255, 0.08);
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-base); color: var(--text-main); font-family: 'Inter', sans-serif; padding-bottom: 2rem; -webkit-font-smoothing: antialiased; }
        h1, h2, h3 { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 0.5px; }

        /* BANNER DE COBRANZA AUTOMÁTICO */
        #payment-warning { display: none; background: rgba(239, 68, 68, 0.15); border-bottom: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; padding: 0.8rem 1rem; text-align: center; font-size: 0.85rem; font-weight: 500; }

        .app-header { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 1.5rem 1rem; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 50; border-bottom: 1px solid var(--border-light); }
        .brand-logo { font-weight: 700; font-size: 1.4rem; font-style: italic; }
        .brand-logo .orange { color: var(--accent); }
        .user-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 1rem; color: white;}

        .container { padding: 1.5rem; max-width: 600px; margin: 0 auto; }
        
        .welcome-text { color: var(--accent); font-weight: 600; font-size: 0.75rem; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 0.2rem; display: block;}
        .welcome-section h1 { font-size: 2.2rem; line-height: 1.1; margin-bottom: 2rem; }

        .routine-card { background: linear-gradient(145deg, #121212 0%, #1a0a00 100%); border-left: 4px solid var(--accent); border-radius: 16px; padding: 1.5rem; margin-bottom: 2rem; position: relative; }
        .tag-today { position: absolute; top: 0; right: 0; background: var(--accent); color: white; font-family: 'Oswald', sans-serif; font-size: 0.75rem; padding: 4px 12px; border-bottom-left-radius: 12px; letter-spacing: 1px; }
        .routine-title { font-size: 1.6rem; margin-bottom: 0.5rem; }
        .routine-desc { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1rem; line-height: 1.5; }
        
        .day-selector { display: flex; gap: 10px; overflow-x: auto; margin-bottom: 1.5rem; padding-bottom: 0.5rem; }
        .day-selector::-webkit-scrollbar { height: 4px; }
        .day-selector::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }
        
        .day-badge { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border-light); background: #1a1a1a; color: var(--text-muted); font-family: 'Oswald', sans-serif; white-space: nowrap; cursor: pointer; transition: 0.3s; font-size: 0.9rem;}
        .day-badge.active { background: var(--accent); color: white; border-color: var(--accent); }
        .day-badge.completed { border-color: var(--success); color: var(--success); background: rgba(16, 185, 129, 0.1); }
        
        .btn-play { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; background: white; color: black; padding: 1.2rem; border-radius: 12px; font-family: 'Oswald', sans-serif; font-size: 1.1rem; border: none; cursor: pointer; transition: 0.3s; }
        .btn-play:active { transform: scale(0.97); }

        .section-title { font-size: 1rem; color: var(--text-muted); margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .pr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .pr-card { background: var(--bg-surface); padding: 1.2rem; border-radius: 12px; border: 1px solid var(--border-light); text-align: center; }
        .pr-card h3 { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem; }
        .pr-value { font-family: 'Oswald', sans-serif; font-size: 2rem; font-weight: 700; color: white; line-height: 1;}
        .pr-value small { font-size: 1rem; color: var(--accent); }

        /* MODAL DE ENTRENAMIENTO ACTIVO */
        .workout-modal { position: fixed; inset: 0; background: var(--bg-base); z-index: 100; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }
        .workout-modal.active { transform: translateY(0); }
        .workout-header { padding: 1.5rem; border-bottom: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 2; }
        .workout-content { flex-grow: 1; overflow-y: auto; padding: 1.5rem; }
        
        .exercise-item { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 16px; padding: 1.2rem; margin-bottom: 1.5rem; }
        .exercise-name { font-family: 'Oswald', sans-serif; font-size: 1.3rem; margin-bottom: 1rem; color: white;}
        
        .btn-video { width: 100%; background: #141414; color: white; border: 1px solid var(--border-light); padding: 10px; border-radius: 8px; font-family: 'Oswald', sans-serif; font-size: 0.85rem; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 1rem; transition: 0.3s; text-transform: uppercase; letter-spacing: 0.5px;}
        .btn-video:active { background: #222; }
        .video-container { width: 100%; aspect-ratio: 16/9; background: #0a0a0a; border-radius: 8px; overflow: hidden; margin-bottom: 1rem; border: 1px solid var(--border-light); display: none; animation: fadeIn 0.3s ease;}
        .video-container iframe { width: 100%; height: 100%; border: none; }
        
        .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
        .meta-badge { background: #1a1a1a; padding: 8px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); text-align: center; }
        .notes-box { background: rgba(255, 94, 0, 0.05); border-left: 2px solid var(--accent); padding: 10px; border-radius: 0 8px 8px 0; font-size: 0.85rem; color: var(--text-main); margin-bottom: 1rem; }
        
        .btn-log-pr { width: 100%; background: transparent; border: 1px dashed var(--accent); color: var(--accent); padding: 12px; border-radius: 8px; font-family: 'Oswald', sans-serif; font-size: 0.9rem; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; text-transform: uppercase;}
        
        .rm-calculator { display: none; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border-light); animation: fadeIn 0.3s ease; }
        .rm-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
        .rm-input-box { position: relative; }
        .rm-input-box input { width: 100%; background: #000; border: 1px solid var(--border-light); color: white; padding: 1rem; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 1.2rem; text-align: center; }
        .rm-input-box label { position: absolute; top: -8px; left: 10px; background: var(--bg-card); padding: 0 5px; font-size: 0.7rem; color: var(--accent); font-weight: bold; text-transform: uppercase; }
        .btn-save-pr { width: 100%; background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; font-family: 'Oswald', sans-serif; font-size: 1rem; cursor: pointer; }
        
        .btn-finish-workout { width: 100%; background: var(--success); color: black; border: none; padding: 1.5rem; border-radius: 12px; font-family: 'Oswald', sans-serif; font-size: 1.2rem; cursor: pointer; margin-top: 1rem; margin-bottom: 3rem; text-transform: uppercase;}

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .skeleton { background: linear-gradient(90deg, #111 25%, #222 50%, #111 75%); background-size: 200% 100%; animation: loading 1.5s infinite; color: transparent !important; border-radius: 4px; user-select: none; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        #install-banner { display: none; background: var(--accent); color: white; padding: 1rem; text-align: center; font-weight: 600; font-size: 0.9rem; position: fixed; bottom: 0; width: 100%; z-index: 1000; cursor: pointer;}
    </style>
</head>
<body>

    <!-- AVISO DE COBRANZA INTEGRADO -->
    <div id="payment-warning">⚠️ Tu ciclo de entrenamiento está por vencer. Recuerda gestionar tu pago.</div>

    <header class="app-header">
        <div class="brand-logo"><span class="orange">M</span><span class="white">OVEMENT</span></div>
        <div class="user-avatar" id="header-avatar">--</div>
    </header>

    <main class="container">
        
        <section class="welcome-section">
            <span class="welcome-text" id="current-date">Cargando...</span>
            <h1>HOLA, <span id="user-firstname" class="skeleton">ATLETA</span></h1>
        </section>

        <section class="routine-card">
            <div class="tag-today">ACTIVA</div>
            <h2 class="routine-title skeleton" id="routine-title">Buscando plan...</h2>
            <p class="routine-desc" id="routine-desc">Sincronizando con el servidor...</p>
            
            <div class="day-selector" id="day-selector-container"></div>

            <button class="btn-play" id="btn-iniciar" style="display: none;" onclick="abrirWorkoutActivo()">
                ▶ INICIAR ENTRENAMIENTO
            </button>
        </section>

        <div class="section-title">
            <h3>TUS MÁXIMOS (1RM EST.)</h3>
        </div>
        <section class="pr-grid" id="pr-container">
            <div class="skeleton" style="height: 100px; border-radius: 12px;"></div>
            <div class="skeleton" style="height: 100px; border-radius: 12px;"></div>
        </section>

    </main>

    <!-- MODAL DE ENTRENAMIENTO ACTIVO -->
    <div id="workoutModal" class="workout-modal">
        <div class="workout-header">
            <div>
                <span style="color: var(--accent); font-size: 0.75rem; font-weight: 700; letter-spacing: 1px;">EN CURSO</span>
                <h2 id="modal-workout-title" style="font-size: 1.5rem; line-height: 1.2;">DÍA DE ENTRENAMIENTO</h2>
            </div>
            <button onclick="cerrarWorkout()" style="background:none; border:none; color:white; font-size:2rem; cursor:pointer;">×</button>
        </div>
        <div class="workout-content">
            <div id="ejercicios-container"></div>
            <button class="btn-finish-workout" onclick="finalizarEntrenamiento()">✔ COMPLETAR DÍA</button>
        </div>
    </div>

    <!-- BANNER DE INSTALACIÓN PWA -->
    <div id="install-banner" onclick="instalarApp()">📲 Toca aquí para instalar la App en tu teléfono</div>

    <script>
        const opcionesFecha = { weekday: 'long', month: 'long', day: 'numeric' };
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('es-ES', opcionesFecha);

        let dbClient = null;
        let athleteId = null;
        let rutinaGlobal = null; 
        let diaSeleccionadoIndex = 0;
        let PRsCalculados = {}; 
        let diasCompletados = []; 

        document.addEventListener('DOMContentLoaded', async () => {
            // LÓGICA DE MEMORIA (CACHÉ) INTEGRADA
            const urlParams = new URLSearchParams(window.location.search);
            const urlId = urlParams.get('id');
            
            if (urlId) {
                athleteId = urlId;
                localStorage.setItem('mh_atleta_id', urlId); // Guarda el ID en el teléfono
                // Limpia la barra de direcciones para que se vea como una app real
                window.history.replaceState({}, document.title, window.location.pathname);
            } else {
                athleteId = localStorage.getItem('mh_atleta_id'); // Recupera el ID si ya había entrado antes
            }

            if (!athleteId) {
                document.body.innerHTML = '<div style="padding: 3rem 1.5rem; text-align: center;"><h1 style="color:var(--danger); margin-bottom:1rem;">ACCESO DENEGADO</h1><p style="color:var(--text-muted);">No hemos podido identificarte. Solicita a tu entrenador tu link personal.</p></div>';
                return;
            }

            if (typeof window.MH_CONFIG !== 'undefined') {
                dbClient = window.supabase.createClient(window.MH_CONFIG.SUPABASE_URL, window.MH_CONFIG.SUPABASE_ANON_KEY);
                await cargarPerfil();
                await cargarHistorialPRs(); 
                await cargarRutinaActiva();
            }
        });

        // ==========================================
        // EXTRACCIÓN ROBUSTA DE YOUTUBE
        // ==========================================
        function extraerVideoId(url) {
            if (!url) return null;
            let videoId = null;
            if (url.includes('v=')) { videoId = url.split('v=')[1]; } 
            else if (url.includes('youtu.be/')) { videoId = url.split('youtu.be/')[1]; } 
            else if (url.includes('shorts/')) { videoId = url.split('shorts/')[1]; }
            
            if (videoId) {
                const ampersandPosition = videoId.indexOf('&');
                if (ampersandPosition !== -1) videoId = videoId.substring(0, ampersandPosition);
                const questionPosition = videoId.indexOf('?');
                if (questionPosition !== -1) videoId = videoId.substring(0, questionPosition);
            }
            return videoId;
        }

        async function cargarPerfil() {
            try {
                // TRAEMOS TAMBIÉN LA FECHA DE CORTE
                const { data } = await dbClient.from('profiles').select('name, fecha_corte').eq('id', athleteId).single();
                if (data) {
                    const firstName = data.name.split(' ')[0].toUpperCase();
                    document.getElementById('user-firstname').innerText = firstName;
                    document.getElementById('user-firstname').classList.remove('skeleton');
                    document.getElementById('header-avatar').innerText = firstName.substring(0, 2);

                    // LÓGICA DE COBRANZA AUTOMÁTICA
                    if (data.fecha_corte) {
                        const hoy = new Date();
                        hoy.setHours(0,0,0,0);
                        const fechaCorte = new Date(data.fecha_corte + 'T12:00:00');
                        const diffDays = Math.ceil((fechaCorte - hoy) / (1000 * 60 * 60 * 24));
                        
                        if (diffDays <= 5) {
                            const banner = document.getElementById('payment-warning');
                            banner.style.display = 'block';
                            if (diffDays < 0) {
                                banner.innerText = `⚠️ Tu ciclo venció el ${fechaCorte.toLocaleDateString('es-ES')}. Por favor, gestiona tu pago.`;
                            } else if (diffDays === 0) {
                                banner.innerText = `⚠️ Tu ciclo de entrenamiento vence HOY.`;
                            } else {
                                banner.innerText = `⚠️ Tu ciclo de entrenamiento vence en ${diffDays} día(s).`;
                            }
                        }
                    }
                }
            } catch (e) {}
        }

        async function cargarHistorialPRs() {
            const container = document.getElementById('pr-container');
            try {
                const { data } = await dbClient.from('personal_records')
                    .select('*').eq('user_id', athleteId).order('rm_calculated', { ascending: false });

                if (!data || data.length === 0) {
                    container.innerHTML = '<p style="color: var(--text-muted); grid-column: span 2; text-align: center; padding: 1rem;">No hay marcas registradas. Usa el botón en tu rutina para registrar tus pesos.</p>';
                    return;
                }

                const mejoresMarcas = {};
                data.forEach(pr => {
                    const key = pr.exercise.toLowerCase().trim();
                    if (!mejoresMarcas[key] || mejoresMarcas[key].rm_calculated < pr.rm_calculated) {
                        mejoresMarcas[key] = pr;
                        PRsCalculados[key] = pr.rm_calculated; 
                    }
                });

                container.innerHTML = '';
                Object.values(mejoresMarcas).forEach(pr => {
                    container.innerHTML += `
                        <div class="pr-card">
                            <h3>${pr.exercise.toUpperCase()}</h3>
                            <div class="pr-value">${Math.round(pr.rm_calculated)} <small>kg</small></div>
                            <div style="font-size: 0.7rem; color: var(--text-muted); margin-top: 5px;">Base: ${pr.weight}kg x ${pr.reps} reps</div>
                        </div>
                    `;
                });
            } catch (e) {}
        }

        async function cargarRutinaActiva() {
            try {
                const { data } = await dbClient.from('routines')
                    .select('*')
                    .or(`assigned_to.eq.${athleteId},assigned_to.eq.global`)
                    .order('created_at', { ascending: false })
                    .limit(1);

                const titleEl = document.getElementById('routine-title');
                titleEl.classList.remove('skeleton');

                if (data && data.length > 0) {
                    rutinaGlobal = data[0];
                    titleEl.innerText = rutinaGlobal.name;
                    
                    const savedProgress = localStorage.getItem(`mh_progreso_${athleteId}_${rutinaGlobal.id}`);
                    diasCompletados = savedProgress ? JSON.parse(savedProgress) : [];

                    renderizarSelectorDias();
                    document.getElementById('btn-iniciar').style.display = 'flex';
                } else {
                    titleEl.innerText = "DÍA DE DESCANSO";
                    document.getElementById('routine-desc').innerText = "No hay planificaciones activas asignadas a tu perfil en este momento.";
                }
            } catch (e) {}
        }

        // ==========================================
        // ALGORITMO DE PRIORIDAD DE DÍAS
        // ==========================================
        function renderizarSelectorDias() {
            const container = document.getElementById('day-selector-container');
            container.innerHTML = '';
            let diaRecomendado = null;
            
            for (let i = 0; i < rutinaGlobal.blocks.length; i++) {
                let bloque = rutinaGlobal.blocks[i];
                let isCompletado = diasCompletados.includes(bloque.day);
                let isCardio = bloque.day.toLowerCase().includes('cardio') || (bloque.warmup && bloque.warmup.toLowerCase().includes('cardio'));

                if (!isCompletado) {
                    if (!isCardio) {
                        diaRecomendado = i; 
                        break; 
                    } else if (diaRecomendado === null) {
                        diaRecomendado = i; 
                    }
                }
            }

            if (diaRecomendado === null) diaRecomendado = 0; 
            seleccionarDia(diaRecomendado);

            rutinaGlobal.blocks.forEach((bloque, index) => {
                let isCompletado = diasCompletados.includes(bloque.day);
                let btnClass = isCompletado ? 'day-badge completed' : 'day-badge';
                if (index === diaSeleccionadoIndex) btnClass += ' active';
                let icon = isCompletado ? '✔ ' : '';
                container.innerHTML += `<div class="${btnClass}" onclick="seleccionarDia(${index})">${icon}${bloque.day}</div>`;
            });
            
            document.getElementById('routine-desc').innerHTML = `Hoy te recomendamos hacer: <strong style="color:white;">${rutinaGlobal.blocks[diaSeleccionadoIndex].day}</strong>`;
        }

        function seleccionarDia(index) {
            diaSeleccionadoIndex = index;
            document.querySelectorAll('.day-badge').forEach((badge, i) => {
                if (i === index) badge.classList.add('active');
                else badge.classList.remove('active');
            });
        }

        // ==========================================
        // ENTRENAMIENTO ACTIVO Y MATEMÁTICAS
        // ==========================================
        function abrirWorkoutActivo() {
            if (!rutinaGlobal) return;
            
            const diaActivo = rutinaGlobal.blocks[diaSeleccionadoIndex]; 
            document.getElementById('modal-workout-title').innerText = `${rutinaGlobal.name} - ${diaActivo.day}`;
            
            const container = document.getElementById('ejercicios-container');
            container.innerHTML = ''; 

            if(diaActivo.warmup) {
                container.innerHTML += `
                    <div style="background: var(--bg-card); padding: 1.2rem; border-radius: 12px; border: 1px dashed var(--border-light); margin-bottom: 1.5rem;">
                        <h3 style="font-size: 0.9rem; color: var(--accent); margin-bottom: 0.5rem;">🔥 INDICACIONES DEL COACH</h3>
                        <p style="font-size: 0.95rem; color: var(--text-main); white-space: pre-wrap; line-height: 1.5;">${diaActivo.warmup}</p>
                    </div>
                `;
            }

            diaActivo.exercises.forEach((exe, index) => {
                let videoToggleHTML = '';
                let iframeHTML = '';
                
                const videoId = extraerVideoId(exe.video);
                if(videoId) {
                    videoToggleHTML = `
                        <button class="btn-video" onclick="toggleVideo('${index}')">
                            ▶ Ver Demostración
                        </button>
                    `;
                    iframeHTML = `
                        <div class="video-container" id="video-${index}">
                            <iframe src="https://www.youtube.com/embed/${videoId}?rel=0&modestbranding=1" allowfullscreen></iframe>
                        </div>
                    `;
                }

                let intensidadRender = exe.intensity || '-';
                const exeKey = exe.exercise.toLowerCase().trim();

                if (intensidadRender.includes('%') && PRsCalculados[exeKey]) {
                    let porcentaje = parseFloat(intensidadRender.replace(/\D/g, '')); 
                    if (!isNaN(porcentaje)) {
                        let pesoObjetivo = PRsCalculados[exeKey] * (porcentaje / 100);
                        intensidadRender = `<span style="color:var(--text-muted);">${exe.intensity}</span> ➔ <span style="color:var(--accent); font-size:1.1rem;">${Math.round(pesoObjetivo)}kg</span>`;
                    }
                }

                container.innerHTML += `
                    <div class="exercise-item">
                        <h3 class="exercise-name">${index + 1}. ${exe.exercise.toUpperCase()}</h3>
                        
                        ${videoToggleHTML}
                        ${iframeHTML}

                        <div class="meta-grid">
                            <div class="meta-badge">🎯 ${exe.reps || '-'}</div>
                            <div class="meta-badge">⏱ ${exe.rest || '-'}</div>
                            <div class="meta-badge" style="grid-column: span 2; background: rgba(255,255,255,0.05); color:white; font-size: 1rem;">
                                ⚡ ${intensidadRender}
                            </div>
                        </div>
                        ${exe.notes ? `<div class="notes-box">${exe.notes}</div>` : ''}
                        
                        <button class="btn-log-pr" onclick="toggleCalc('${index}')">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10M18 20V4M6 20v-4"/></svg>
                            Calcular 1RM y Guardar Marca
                        </button>

                        <div class="rm-calculator" id="calc-${index}">
                            <div class="rm-inputs">
                                <div class="rm-input-box">
                                    <label>Kilos Levantados</label>
                                    <input type="number" id="weight-${index}" placeholder="0" inputmode="decimal">
                                </div>
                                <div class="rm-input-box">
                                    <label>Repeticiones</label>
                                    <input type="number" id="reps-${index}" placeholder="0" inputmode="numeric">
                                </div>
                            </div>
                            <button class="btn-save-pr" onclick="guardarMarca('${exe.exercise}', '${index}', this)">REGISTRAR RÉCORD</button>
                        </div>
                    </div>
                `;
            });

            document.getElementById('workoutModal').classList.add('active');
        }

        function cerrarWorkout() {
            document.getElementById('workoutModal').classList.remove('active');
            cargarHistorialPRs(); 
        }

        // Toggles para mostrar/ocultar elementos
        function toggleVideo(index) {
            const vid = document.getElementById(`video-${index}`);
            vid.style.display = vid.style.display === 'block' ? 'none' : 'block';
        }

        function toggleCalc(index) {
            const calc = document.getElementById(`calc-${index}`);
            calc.style.display = calc.style.display === 'block' ? 'none' : 'block';
        }

        async function guardarMarca(ejercicio, index, btnElement) {
            const peso = parseFloat(document.getElementById(`weight-${index}`).value);
            const reps = parseInt(document.getElementById(`reps-${index}`).value);

            if (isNaN(peso) || isNaN(reps) || peso <= 0 || reps <= 0) {
                return alert("Por favor, ingresa el peso y las repeticiones que lograste.");
            }

            const rmCalculado = reps === 1 ? peso : peso * (1 + (reps / 30));

            btnElement.innerText = "GUARDANDO...";
            btnElement.disabled = true;

            try {
                const { error } = await dbClient.from('personal_records').insert([{
                    user_id: athleteId,
                    exercise: ejercicio,
                    weight: peso,
                    reps: reps,
                    rm_calculated: rmCalculado
                }]);

                if (error) throw error;
                
                const exeKey = ejercicio.toLowerCase().trim();
                if (!PRsCalculados[exeKey] || PRsCalculados[exeKey] < rmCalculado) {
                    PRsCalculados[exeKey] = rmCalculado;
                }
                
                btnElement.style.background = "var(--success)";
                btnElement.innerText = `¡1RM EST: ${Math.round(rmCalculado)}KG!`;
                
                setTimeout(() => { toggleCalc(index); }, 2000); 
            } catch (e) {
                btnElement.innerText = "ERROR";
                btnElement.style.background = "var(--danger)";
                setTimeout(() => { btnElement.innerText = "REGISTRAR RÉCORD"; btnElement.style.background = "var(--accent)"; btnElement.disabled = false; }, 2000);
            }
        }

        function finalizarEntrenamiento() {
            const diaActual = rutinaGlobal.blocks[diaSeleccionadoIndex].day;
            
            if (!diasCompletados.includes(diaActual)) {
                diasCompletados.push(diaActual);
                localStorage.setItem(`mh_progreso_${athleteId}_${rutinaGlobal.id}`, JSON.stringify(diasCompletados));
            }
            
            cerrarWorkout();
            renderizarSelectorDias(); 
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ==========================================
        // LÓGICA PWA (Instalación)
        // ==========================================
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-banner').style.display = 'block';
        });

        async function instalarApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    document.getElementById('install-banner').style.display = 'none';
                }
                deferredPrompt = null;
            }
        }
        
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW Falló:', err));
            });
        }
    </script>
</body>
</html>
