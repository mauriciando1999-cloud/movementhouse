<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movement House</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Oswald:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-base: #000000; --accent: #FF5E00; --text-main: #ffffff; --text-muted: #888888; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-base); color: var(--text-main); font-family: 'Inter', sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; text-align: center; padding: 2rem; }
        .brand-logo { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 2.5rem; font-style: italic; margin-bottom: 0.5rem; }
        .brand-logo .orange { color: var(--accent); }
        p { color: var(--text-muted); margin-bottom: 3rem; max-width: 400px; line-height: 1.6;}
        
        .btn-container { display: flex; flex-direction: column; gap: 1rem; width: 100%; max-width: 300px; }
        .btn { padding: 1.2rem; border-radius: 8px; font-family: 'Oswald', sans-serif; font-size: 1.1rem; text-decoration: none; text-transform: uppercase; transition: 0.3s; letter-spacing: 1px;}
        .btn-admin { background: var(--accent); color: white; border: none; }
        .btn-admin:hover { background: #e05300; }
        .btn-user { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.2); }
        .btn-user:hover { border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body>

    <div class="brand-logo"><span class="orange">M</span>OVEMENT <span class="orange">H</span>OUSE</div>
    <p>Plataforma de gestión y planificación deportiva de alto rendimiento.</p>

    <div class="btn-container">
        <a href="index-admin.html" class="btn btn-admin">Panel de Entrenador</a>
        <a href="#" class="btn btn-user" onclick="alert('Atleta: Solicita tu enlace de acceso personalizado a tu entrenador por WhatsApp para ver tus rutinas.')">Acceso Atletas</a>
    </div>

</body>
</html>
