<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directorio de Atletas | Movement House</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js" defer></script>

    <style>
        :root {
            --bg-base: #050505;
            --bg-surface: #0a0a0a;
            --bg-card: #121212;
            --accent: #FF5E00;
            --accent-soft: rgba(255, 94, 0, 0.1);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --border-color: #2d2d2d;
            --success: #10b981;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-base); color: var(--text-main); font-family: 'Inter', sans-serif; line-height: 1.6; }

        /* Estructura */
        .page-wrapper { max-width: 1200px; margin: 0 auto; padding: 3rem 2rem; }
        
        /* Header Minimalista */
        .header-section { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 3rem; }
        h1 { font-family: 'Oswald', sans-serif; font-size: 2.5rem; text-transform: uppercase; letter-spacing: 1px; }
        .breadcrumb { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; }

        /* Botón Maestro */
        .btn-new { background: var(--accent); color: white; padding: 0.8rem 1.5rem; border-radius: 8px; border: none; font-family: 'Oswald', sans-serif; font-size: 0.9rem; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .btn-new:hover { background: var(--accent-hover); transform: translateY(-2px); }

        /* Tabla Estilizada */
        .data-table { width: 100%; border-collapse: separate; border-spacing: 0 0.8rem; margin-top: 1rem; }
        .data-table th { color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; padding: 1rem; border-bottom: 1px solid var(--border-color); }
        .data-table td { background: var(--bg-card); padding: 1.2rem 1.5rem; }
        .data-table tr td:first-child { border-top-left-radius: 8px; border-bottom-left-radius: 8px; }
        .data-table tr td:last-child { border-top-right-radius: 8px; border-bottom-right-radius: 8px; }
        
        .avatar-cell { display: flex; align-items: center; gap: 15px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #1e1e1e; display: flex; align-items: center; justify-content: center; font-weight: 700; color: var(--accent); }
        
        .status-pill { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
        .status-al-dia { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
        .status-vencido { background: rgba(255, 94, 0, 0.1); color: var(--accent); border: 1px solid rgba(255, 94, 0, 0.2); }

        /* Modal Rediseñado */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg-card); padding: 3rem; border-radius: 16px; border: 1px solid var(--border-color); width: 100%; max-width: 450px; }
        
        input, select { width: 100%; background: var(--bg-base); border: 1px solid var(--border-color); color: white; padding: 1rem; border-radius: 8px; margin-top: 0.5rem; margin-bottom: 1.5rem; outline: none; }
        input:focus { border-color: var(--accent); }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <header class="header-section">
            <div>
                <div class="breadcrumb">Panel Administrativo</div>
                <h1>Directorio de Atletas</h1>
            </div>
            <button class="btn-new" onclick="window.openUserModal()">+ NUEVO ATLETA</button>
        </header>

        <table class="data-table">
            <thead>
                <tr>
                    <th>Atleta</th>
                    <th>Contacto</th>
                    <th>Estado</th>
                    <th>Próximo Pago</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="directory-tbody">
                <tr><td colspan="5" style="text-align:center; padding: 2rem;">Cargando directorio...</td></tr>
            </tbody>
        </table>
    </div>

    <div id="newUserModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 2rem;">Registrar Atleta</h2>
            <form id="newUserForm" onsubmit="window.crearAtleta(event)">
                <label>Nombre Completo</label>
                <input type="text" id="reg-name" required>
                <label>Email</label>
                <input type="email" id="reg-email" required>
                <label>Fecha de inicio</label>
                <input type="date" id="reg-date" required>
                <button type="submit" id="btn-submit-user" class="btn-new" style="width:100%; justify-content:center;">GUARDAR ATLETA</button>
            </form>
        </div>
    </div>

    <div id="modalPago" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 1rem;">Registrar Pago</h2>
            <p id="payment-user-name" style="color: var(--text-muted); margin-bottom: 2rem;"></p>
            <form onsubmit="procesarPagoAdmin(event)">
                <button type="submit" id="btn-confirm-payment" class="btn-new" style="width:100%; justify-content:center; background: var(--success);">CONFIRMAR PAGO</button>
            </form>
        </div>
    </div>
</body>
</html>
