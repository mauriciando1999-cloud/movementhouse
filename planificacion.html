<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestor de Planificaciones | Movement House</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-base: #000000; --bg-surface: #0a0a0a; --bg-card: #111111;
            --accent: #FF5E00; --accent-hover: #e05300; --accent-glow: rgba(255, 94, 0, 0.25);
            --text-main: #ffffff; --text-muted: #888888;
            --border-light: rgba(255, 255, 255, 0.08); --input-bg: #1a1a1a;
            --success: #10b981; --danger: #ef4444; --info: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-base); color: var(--text-main); font-family: 'Inter', sans-serif; padding-bottom: 5rem; -webkit-font-smoothing: antialiased; }

        /* CABECERA FLOTANTE TÁCTIL */
        .top-nav { position: sticky; top: 0; z-index: 50; background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-light); padding: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .back-btn { color: var(--text-muted); text-decoration: none; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; transition: 0.3s; }
        .back-btn:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-title { font-family: 'Oswald', sans-serif; font-size: 1.2rem; margin: 0; text-transform: uppercase; letter-spacing: 0.5px;}

        .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem 1rem; }
        
        .btn-new { background: var(--accent); color: white; padding: 1rem; border-radius: 8px; border: none; font-family: 'Oswald', sans-serif; font-size: 1.1rem; cursor: pointer; transition: 0.3s; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; text-transform: uppercase; margin-bottom: 1.5rem; width: 100%;}
        .btn-new:hover { background: var(--accent-hover); box-shadow: 0 4px 15px var(--accent-glow); }

        /* TABLA Y SCROLL HORIZONTAL */
        .admin-table-section { background: var(--bg-card); padding: 1rem; border-radius: 12px; border: 1px solid var(--border-light); min-width: 0; }
        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        
        .admin-table { width: 100%; border-collapse: collapse; text-align: left; font-family: 'Inter', sans-serif; }
        .admin-table th { padding: 1rem; color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; border-bottom: 1px solid var(--border-light); white-space: nowrap; }
        .admin-table td { padding: 1.2rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.03); vertical-align: middle; white-space: nowrap; }

        .rutina-nombre { font-family: 'Oswald', sans-serif; font-size: 1.1rem; color: white; }

        .badge { padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; font-family: 'Inter', sans-serif; text-transform: uppercase; display: inline-block;}
        .badge-global { background: rgba(255, 94, 0, 0.15); border: 1px solid rgba(255, 94, 0, 0.3); color: var(--accent); }
        .badge-user { background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.3); color: #60a5fa; }

        /* BOTONES DE ACCIÓN EN TABLA */
        .action-btns { display: flex; gap: 6px; }
        .btn-action { background: transparent; border: 1px solid var(--border-light); color: var(--text-muted); width: 36px; height: 36px; min-width: 36px; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; font-size: 1.1rem; text-decoration: none; }
        .btn-action:hover { background: rgba(255,255,255,0.05); color: white; border-color: white; }
        .btn-action.assign:hover { color: var(--info); border-color: var(--info); background: rgba(59, 130, 246, 0.1); }
        .btn-action.clone:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-glow); }
        .btn-action.edit:hover { color: var(--success); border-color: var(--success); background: rgba(16, 185, 129, 0.1); }
        .btn-action.delete:hover { color: var(--danger); border-color: var(--danger); background: rgba(239, 68, 68, 0.1); }

        /* MODAL ESTILO APP */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: flex-end; z-index: 1000; padding: 0; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg-card); padding: 1.5rem; width: 100%; max-width: 500px; border-radius: 20px 20px 0 0; border-top: 1px solid var(--border-light); transform: translateY(100%); transition: 0.3s; }
        .modal.active .modal-content { transform: translateY(0); }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .modal-title { font-family: 'Oswald', sans-serif; font-size: 1.4rem; color: white; text-transform: uppercase; }
        .btn-close { background: none; border: none; color: var(--text-muted); font-size: 2rem; cursor: pointer; line-height: 1; }

        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.85rem; font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input, .form-group select { width: 100%; padding: 0.9rem; border-radius: 8px; background: var(--input-bg); border: 1px solid var(--border-light); color: white; outline: none; font-family: 'Inter', sans-serif; }
        .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        @media (min-width: 768px) {
            .btn-new { width: auto; display: inline-flex; float: right; margin-top: -3rem; }
            .modal { align-items: center; padding: 1rem; }
            .modal-content { border-radius: 16px; transform: translateY(20px); border: 1px solid var(--border-light); }
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="index.html" class="back-btn">←</a>
        <h2 class="nav-title">Planificaciones</h2>
        <div style="width: 40px;"></div> <!-- Espaciador -->
    </nav>

    <main class="container">
        
        <a href="rutinas.html" class="btn-new">⚡ NUEVA RUTINA</a>
        <div style="clear: both;"></div>

        <section class="admin-table-section">
            <div class="table-responsive">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Rutina</th>
                            <th>Asignado A</th>
                            <th>Calendario</th>
                            <th style="text-align: right;">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="planificaciones-tbody">
                        <tr><td colspan="4" style="text-align:center; padding: 2rem; color: var(--text-muted);">Sincronizando planes...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <!-- MODAL DE CONFIGURACIÓN DE ASIGNACIÓN Y FECHAS -->
    <div id="modalAsignar" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Asignar Rutina</h2>
                <button class="btn-close" onclick="cerrarModal()">×</button>
            </div>
            
            <p id="asignar-nombre" style="color: var(--accent); font-family: 'Oswald', sans-serif; font-size: 1.1rem; margin-bottom: 1.5rem;"></p>
            
            <form onsubmit="guardarAsignacion(event)">
                <div class="form-group">
                    <label>Atleta Asignado</label>
                    <select id="select-atleta" required>
                        <option value="global">🌍 Planilla Global (Todos)</option>
                        <!-- Se llena vía JS -->
                    </select>
                </div>
                
                <div class="grid-2">
                    <div class="form-group">
                        <label>Fecha Inicio</label>
                        <input type="date" id="input-start-date">
                    </div>
                    <div class="form-group">
                        <label>Fecha Fin (Opcional)</label>
                        <input type="date" id="input-end-date">
                    </div>
                </div>
                
                <button type="submit" id="btn-save-assign" class="btn-new" style="width: 100%; margin-top: 1rem; margin-bottom: 0; background: var(--success);">✔ APLICAR CAMBIOS</button>
            </form>
        </div>
    </div>

    <script>
        let dbClient = null;
        let perfilesGlobal = [];
        let planificacionActualId = null;

        document.addEventListener('DOMContentLoaded', async () => {
            if (typeof window.MH_CONFIG !== 'undefined') {
                dbClient = window.supabase.createClient(window.MH_CONFIG.SUPABASE_URL, window.MH_CONFIG.SUPABASE_ANON_KEY);
                await cargarPerfiles();
                await cargarListaPlanificaciones();
            }
        });

        // 1. CARGAR ATLETAS PARA EL SELECTOR
        async function cargarPerfiles() {
            try {
                const { data } = await dbClient.from('profiles').select('id, name').order('name');
                if (data) {
                    perfilesGlobal = data;
                    const select = document.getElementById('select-atleta');
                    data.forEach(p => {
                        select.innerHTML += `<option value="${p.id}">${p.name}</option>`;
                    });
                }
            } catch (error) { console.error("Error cargando perfiles:", error); }
        }

        // 2. RENDERIZAR LA TABLA CON FECHAS
        async function cargarListaPlanificaciones() {
            const tbody = document.getElementById('planificaciones-tbody');
            try {
                const { data, error } = await dbClient.from('routines')
                    .select('id, name, assigned_to, created_at, start_date, end_date')
                    .order('created_at', { ascending: false });
                
                if (error) throw error;

                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 2rem;">No hay planificaciones creadas.</td></tr>';
                    return;
                }

                tbody.innerHTML = '';
                data.forEach(rutina => {
                    const esGlobal = rutina.assigned_to === 'global';
                    let nombreAsignado = 'Planilla Global';
                    
                    if (!esGlobal) {
                        const perfil = perfilesGlobal.find(p => p.id === rutina.assigned_to);
                        nombreAsignado = perfil ? perfil.name : 'Atleta Eliminado';
                    }

                    const badgeClass = esGlobal ? 'badge-global' : 'badge-user';
                    
                    // Lógica visual del calendario
                    let fechaMostrar = `<span style="color:var(--text-muted); font-size:0.85rem;">Creada: ${new Date(rutina.created_at).toLocaleDateString('es-ES')}</span>`;
                    
                    if (rutina.start_date && rutina.end_date) {
                        const d1 = new Date(rutina.start_date + 'T12:00:00').toLocaleDateString('es-ES', {month:'short', day:'numeric'});
                        const d2 = new Date(rutina.end_date + 'T12:00:00').toLocaleDateString('es-ES', {month:'short', day:'numeric'});
                        fechaMostrar = `<span style="color:var(--info); font-weight:600; font-size:0.9rem;">📅 ${d1} - ${d2}</span>`;
                    } else if (rutina.start_date) {
                        const d1 = new Date(rutina.start_date + 'T12:00:00').toLocaleDateString('es-ES', {month:'short', day:'numeric'});
                        fechaMostrar = `<span style="color:var(--success); font-weight:600; font-size:0.9rem;">▶ Inicia: ${d1}</span>`;
                    }

                    // Preparamos los datos para inyectarlos en el botón de asignar
                    const escapedName = rutina.name.replace(/'/g, "\\'");
                    const sDate = rutina.start_date || '';
                    const eDate = rutina.end_date || '';

                    tbody.innerHTML += `
                        <tr>
                            <td><span class="rutina-nombre">${rutina.name}</span></td>
                            <td><span class="badge ${badgeClass}">${nombreAsignado}</span></td>
                            <td>${fechaMostrar}</td>
                            <td>
                                <div class="action-btns" style="justify-content: flex-end;">
                                    <button class="btn-action assign" title="Asignar y Configurar Fechas" onclick="abrirModalAsignar('${rutina.id}', '${escapedName}', '${rutina.assigned_to}', '${sDate}', '${eDate}')">⚙️</button>
                                    <button class="btn-action clone" title="Clonar Rutina" onclick="duplicarRutina('${rutina.id}')">📑</button>
                                    <a href="rutinas.html?edit=${rutina.id}" class="btn-action edit" title="Modificar Ejercicios">✎</a>
                                    <button class="btn-action delete" title="Eliminar Rutina" onclick="eliminarPlanificacion('${rutina.id}', '${escapedName}')">🗑</button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color: var(--danger);">Ocurrió un error cargando los datos.</td></tr>';
            }
        }

        // 3. MOTOR DEL MODAL DE ASIGNACIÓN (USUARIO + FECHAS)
        window.abrirModalAsignar = function(id, nombre, asignadoActualmente, startDate, endDate) {
            planificacionActualId = id;
            document.getElementById('asignar-nombre').innerText = nombre;
            document.getElementById('select-atleta').value = asignadoActualmente;
            document.getElementById('input-start-date').value = startDate;
            document.getElementById('input-end-date').value = endDate;
            document.getElementById('modalAsignar').classList.add('active');
        }

        window.cerrarModal = function() {
            document.getElementById('modalAsignar').classList.remove('active');
            planificacionActualId = null;
        }

        window.guardarAsignacion = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-save-assign');
            
            const payload = {
                assigned_to: document.getElementById('select-atleta').value,
                start_date: document.getElementById('input-start-date').value || null,
                end_date: document.getElementById('input-end-date').value || null
            };
            
            btn.innerText = 'GUARDANDO...'; 
            btn.disabled = true;

            try {
                const { error } = await dbClient.from('routines').update(payload).eq('id', planificacionActualId);
                if (error) throw error;
                
                cerrarModal();
                await cargarListaPlanificaciones();
            } catch (error) {
                alert("Error al actualizar la configuración de la rutina.");
            } finally {
                btn.innerText = '✔ APLICAR CAMBIOS'; 
                btn.disabled = false;
            }
        }

        // 4. EL SUPER PODER: CLONAR RUTINAS
        window.duplicarRutina = async function(id) {
            // Animación temporal para dar feedback
            const btn = event.currentTarget;
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '⏳';
            
            try {
                // Paso 1: Traemos la rutina original completa
                const { data: original, error: fetchError } = await dbClient.from('routines').select('*').eq('id', id).single();
                if (fetchError) throw fetchError;

                // Paso 2: Limpiamos los datos únicos (ID, fechas, creacion) y le ponemos "Copia" al nombre
                const copia = {
                    name: original.name + " (Copia)",
                    assigned_to: original.assigned_to,
                    blocks: original.blocks, // Los ejercicios se copian intactos
                    start_date: null,
                    end_date: null
                };

                // Paso 3: Insertamos la nueva rutina clonada
                const { error: insertError } = await dbClient.from('routines').insert([copia]);
                if (insertError) throw insertError;

                // Refrescamos la tabla
                await cargarListaPlanificaciones();

            } catch (error) {
                alert("Hubo un problema al intentar duplicar la rutina.");
                btn.innerHTML = originalHTML;
            }
        }

        // 5. ELIMINAR RUTINA
        window.eliminarPlanificacion = async function(id, nombre) {
            if (!confirm(`¿Eliminar la rutina "${nombre}" de forma permanente?`)) return;
            try {
                const { error } = await dbClient.from('routines').delete().eq('id', id);
                if (error) throw error;
                await cargarListaPlanificaciones();
            } catch (error) {
                alert("Error eliminando la rutina.");
            }
        }
    </script>
</body>
</html>
