<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Constructor de Rutinas | Movement House</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Oswald:wght@600;700&display=swap" rel="stylesheet">
    
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-base: #000000; --bg-surface: #0a0a0a; --bg-card: #111111;
            --accent: #FF5E00; --accent-hover: #e05300; --accent-glow: rgba(255, 94, 0, 0.25);
            --text-main: #ffffff; --text-muted: #888888;
            --border-light: rgba(255, 255, 255, 0.08);
            --input-bg: #1a1a1a; --success: #10b981; --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-base); color: var(--text-main); font-family: 'Inter', sans-serif; min-height: 100vh; padding-bottom: 5rem; }
        h1, h2, h3 { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 0.5px; }

        .builder-header { display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 2.5rem; border-bottom: 1px solid var(--border-light); position: sticky; top: 0; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); z-index: 50; }
        .brand-logo { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 1.5rem; font-style: italic; display: flex; align-items: center; gap: 15px; text-decoration: none; }
        .brand-logo .orange { color: var(--accent); } .brand-logo .white { color: var(--text-main); }
        .back-arrow { color: var(--text-muted); font-style: normal; font-size: 1.2rem; transition: 0.3s;}
        .back-arrow:hover { color: var(--accent); }
        
        .btn-save { background: var(--accent); color: white; border: none; padding: 0.7rem 1.5rem; border-radius: 6px; font-size: 0.95rem; cursor: pointer; transition: 0.3s; font-family: 'Oswald', sans-serif; letter-spacing: 0.5px; }
        .btn-save:hover { background: var(--accent-hover); box-shadow: 0 4px 15px var(--accent-glow); }

        .container { max-width: 1400px; margin: 2rem auto; padding: 0 2rem; }
        
        .routine-meta { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem; padding: 1.5rem; background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 12px; }
        .form-group label { display: block; font-family: 'Oswald', sans-serif; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem; letter-spacing: 0.5px;}
        .form-group input, .form-group select { width: 100%; background: var(--input-bg); border: 1px solid var(--border-light); color: white; padding: 0.8rem; border-radius: 6px; outline: none; font-family: 'Inter', sans-serif; transition: 0.3s; }
        .form-group input:focus, .form-group select:focus { border-color: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }

        .day-block { margin-bottom: 2rem; border: 1px solid var(--border-light); border-radius: 12px; background: var(--bg-surface); overflow: hidden; }
        .day-header { background: #141414; padding: 1.2rem 1.5rem; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid var(--border-light); gap: 1rem; }
        .day-title-input { background: transparent; border: none; color: var(--accent); font-size: 1.5rem; outline: none; width: 150px; font-family: 'Oswald', sans-serif; text-transform: uppercase; }
        .acondicionamiento-input { flex-grow: 1; background: var(--input-bg); border: 1px solid var(--border-light); color: var(--text-main); padding: 0.6rem; border-radius: 6px; height: 45px; font-family: 'Inter', sans-serif; resize: vertical; }
        
        .exercises-grid { padding: 1rem; overflow-x: auto; }
        .grid-header { display: grid; grid-template-columns: 2fr 1.5fr 1fr 1fr 1fr 1.5fr 90px; gap: 10px; padding: 0 0.5rem 0.5rem 0.5rem; border-bottom: 1px solid var(--border-light); color: var(--text-muted); font-size: 0.8rem; font-family: 'Oswald', sans-serif; min-width: 900px; }
        .exercise-row { display: grid; grid-template-columns: 2fr 1.5fr 1fr 1fr 1fr 1.5fr 90px; gap: 10px; padding: 0.5rem; align-items: start; min-width: 900px; transition: 0.2s; border-radius: 6px; }
        .exercise-row:hover { background: rgba(255, 255, 255, 0.02); }
        .exercise-row input, .exercise-row textarea { width: 100%; background: var(--input-bg); border: 1px solid transparent; color: white; padding: 0.7rem; border-radius: 6px; font-size: 0.9rem; font-family: 'Inter', sans-serif; transition: 0.3s; }
        .exercise-row input:focus, .exercise-row textarea:focus { border-color: var(--accent); outline: none; background: #000; }
        
        .row-actions { display: flex; gap: 4px; align-items: center; justify-content: flex-end; }
        .btn-icon { background: transparent; border: 1px solid transparent; color: var(--text-muted); width: 28px; height: 28px; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .btn-icon:hover { background: rgba(255,255,255,0.05); color: white; border-color: var(--border-light); }
        .btn-icon.history:hover { color: #3b82f6; border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
        .btn-icon.delete:hover { color: var(--danger); border-color: var(--danger); background: rgba(239, 68, 68, 0.1); }

        .add-row-btn { width: 100%; background: transparent; border: 1px dashed var(--border-light); color: var(--text-muted); padding: 0.8rem; border-radius: 6px; margin-top: 1rem; cursor: pointer; font-family: 'Oswald', sans-serif; text-transform: uppercase; transition: 0.3s; }
        .add-row-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
        
        .add-day-master { display: block; width: 100%; max-width: 400px; margin: 3rem auto; background: transparent; border: 2px solid var(--accent); color: var(--accent); padding: 1rem; border-radius: 8px; cursor: pointer; font-family: 'Oswald', sans-serif; text-transform: uppercase; transition: 0.3s; }
        .add-day-master:hover { background: var(--accent); color: white; box-shadow: 0 4px 15px var(--accent-glow); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 1000; opacity: 0; transition: opacity 0.3s; }
        .modal.active { display: flex; opacity: 1; }
        .modal-content { background: var(--bg-card); padding: 2.5rem; border-radius: 12px; border: 1px solid var(--border-light); width: 100%; max-width: 600px; transform: translateY(20px); transition: 0.3s; }
        .modal.active .modal-content { transform: translateY(0); }
        .history-list { margin-top: 1.5rem; max-height: 300px; overflow-y: auto; padding-right: 10px; }
        .history-list::-webkit-scrollbar { width: 6px; }
        .history-list::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }
        .history-item { padding: 1rem; border-bottom: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center;}
        .history-item:last-child { border-bottom: none; }
        .history-date { color: var(--text-muted); font-size: 0.85rem; font-family: 'Oswald', sans-serif; }
        .history-data { color: white; font-weight: 600; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>

    <header class="builder-header">
        <a href="index-admin.html" class="brand-logo">
            <span class="back-arrow">←</span>
            <span><span class="orange">M</span><span class="white">OVEMENT</span> <span class="orange">H</span><span class="white">OUSE</span></span>
        </a>
        <button id="btn-save-routine" class="btn-save" onclick="guardarRutina()">GUARDAR PLANIFICACIÓN</button>
    </header>

    <main class="container">
        <section class="routine-meta">
            <div class="form-group">
                <label>NOMBRE DEL BLOQUE</label>
                <input type="text" id="routine-name" placeholder="Ej: Fuerza Máxima - Fase 1">
            </div>
            <div class="form-group">
                <label>ASIGNAR A (ATLETA)</label>
                <select id="routine-assign"><option value="global">Planilla Global</option></select>
            </div>
            <div class="form-group">
                <label>FECHA DE INICIO</label>
                <input type="date" id="routine-date">
            </div>
        </section>

        <div id="days-container"></div>
        <button class="add-day-master" onclick="agregarDia()">+ AÑADIR NUEVO DÍA</button>
    </main>

    <div id="historialModal" class="modal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; margin-bottom:1rem; align-items:center;">
                <div>
                    <h2 style="color: white; font-size: 1.5rem;">HISTORIAL DE MARCAS</h2>
                    <p id="historial-ejercicio-titulo" style="color: var(--accent); font-weight: 600; font-size: 0.9rem; text-transform: uppercase;">-</p>
                </div>
                <button onclick="cerrarHistorial()" style="background:none; border:none; color:var(--text-muted); font-size:2rem; cursor:pointer;">×</button>
            </div>
            <div class="history-list" id="historial-lista"></div>
        </div>
    </div>
    
    <template id="row-template">
        <div class="exercise-row">
            <input type="text" placeholder="Ej: Back Squat" class="col-exercise">
            <!-- AQUÍ SE COLOCA EL ENLACE DEL VIDEO PARA QUE APAREZCA EN LA APP DEL ATLETA -->
            <input type="url" placeholder="URL Video YouTube" class="col-video">
            <input type="text" placeholder="Intensidad (Ej: 80% / 100kg)" class="col-intensity">
            <input type="text" placeholder="Sets x Reps (Ej: 4x5)" class="col-reps">
            <input type="text" placeholder="Descanso (Ej: 3 min)" class="col-rest">
            <textarea rows="1" placeholder="Notas/RIR (Ej: Bajar en 3 segs)" class="col-notes"></textarea>
            <div class="row-actions">
                <button class="btn-icon history" title="Ver Historial (PRs)" onclick="verHistorial(this)">🕒</button>
                <button class="btn-icon" title="Duplicar Ejercicio" onclick="duplicarFila(this)">⧉</button>
                <button class="btn-icon delete" title="Eliminar Ejercicio" onclick="eliminarFila(this)">×</button>
            </div>
        </div>
    </template>

    <template id="day-template">
        <div class="day-block">
            <div class="day-header">
                <input type="text" class="day-title-input" value="Día X">
                <textarea class="acondicionamiento-input" placeholder="Escribe aquí el acondicionamiento, calentamiento o indicaciones generales para el día..."></textarea>
                <button class="btn-icon delete" style="width: 35px; height: 35px; font-size: 1.2rem;" onclick="eliminarDia(this)">🗑</button>
            </div>
            <div class="exercises-grid">
                <div class="grid-header">
                    <div>EJERCICIO</div><div>VIDEO REF.</div><div>INTENSIDAD</div><div>SETS x REPS</div><div>DESCANSO</div><div>ANOTACIONES</div><div style="text-align: right;">ACCIONES</div>
                </div>
                <div class="rows-container"></div>
                <button class="add-row-btn" onclick="agregarFila(this)">+ AÑADIR EJERCICIO</button>
            </div>
        </div>
    </template>

    <script>
        let dbClient = null;
        let diaContador = 0;
        let rutineEditId = null;

        document.addEventListener('DOMContentLoaded', async () => {
            if (typeof window.MH_CONFIG !== 'undefined') {
                dbClient = window.supabase.createClient(window.MH_CONFIG.SUPABASE_URL, window.MH_CONFIG.SUPABASE_ANON_KEY);
                await cargarAtletasSelect();

                const urlParams = new URLSearchParams(window.location.search);
                rutineEditId = urlParams.get('edit');

                if (rutineEditId) {
                    await reconstruirRutina(rutineEditId);
                } else {
                    agregarDia(); 
                }
            } else {
                alert("Error crítico: Falta el archivo config.js");
            }
        });

        async function cargarAtletasSelect() {
            const select = document.getElementById('routine-assign');
            try {
                const { data } = await dbClient.from('profiles').select('id, name').order('name');
                if (data) {
                    data.forEach(atleta => {
                        select.innerHTML += `<option value="${atleta.id}">${atleta.name}</option>`;
                    });
                }
            } catch (error) {}
        }

        function agregarDia(datosDia = null) {
            diaContador++;
            const template = document.getElementById('day-template');
            const clone = template.content.cloneNode(true);
            const rowsContainer = clone.querySelector('.rows-container');

            if (datosDia) {
                clone.querySelector('.day-title-input').value = datosDia.day;
                clone.querySelector('.acondicionamiento-input').value = datosDia.warmup || '';
                
                if (datosDia.exercises && datosDia.exercises.length > 0) {
                    datosDia.exercises.forEach(exe => rowsContainer.appendChild(crearFila(exe)));
                } else {
                    rowsContainer.appendChild(crearFila());
                }
            } else {
                clone.querySelector('.day-title-input').value = `DÍA ${diaContador}`;
                rowsContainer.appendChild(crearFila());
            }

            document.getElementById('days-container').appendChild(clone);
        }

        function crearFila(datosFila = null) {
            const template = document.getElementById('row-template');
            const clone = template.content.cloneNode(true);
            
            if (datosFila) {
                clone.querySelector('.col-exercise').value = datosFila.exercise || '';
                clone.querySelector('.col-video').value = datosFila.video || '';
                clone.querySelector('.col-intensity').value = datosFila.intensity || '';
                clone.querySelector('.col-reps').value = datosFila.reps || '';
                clone.querySelector('.col-rest').value = datosFila.rest || '';
                clone.querySelector('.col-notes').value = datosFila.notes || '';
            }
            return clone;
        }

        window.agregarDia = agregarDia;
        
        window.eliminarDia = (btn) => { 
            if(confirm('¿Seguro que deseas eliminar este día completo y sus ejercicios?')) {
                btn.closest('.day-block').remove(); 
            }
        };
        
        window.agregarFila = (btn) => { 
            btn.previousElementSibling.appendChild(crearFila()); 
        };
        
        window.eliminarFila = (btn) => { 
            const row = btn.closest('.exercise-row'); 
            row.style.opacity = '0'; 
            setTimeout(() => row.remove(), 200); 
        };
        
        window.duplicarFila = (btn) => {
            const originalRow = btn.closest('.exercise-row');
            const cloneRow = originalRow.cloneNode(true);
            
            const inputsOriginales = originalRow.querySelectorAll('input, textarea');
            const inputsClonados = cloneRow.querySelectorAll('input, textarea');
            inputsOriginales.forEach((input, index) => {
                inputsClonados[index].value = input.value;
            });
            
            originalRow.parentNode.insertBefore(cloneRow, originalRow.nextSibling);
        };

        async function reconstruirRutina(id) {
            try {
                const { data, error } = await dbClient.from('routines').select('*').eq('id', id).single();
                if (error) throw error;
                
                document.getElementById('routine-name').value = data.name;
                document.getElementById('routine-assign').value = data.assigned_to;
                if(data.start_date) document.getElementById('routine-date').value = data.start_date;
                
                if (data.blocks && data.blocks.length > 0) {
                    data.blocks.forEach(bloque => agregarDia(bloque));
                }
            } catch (error) {
                alert("Hubo un error recuperando la información de la rutina.");
                agregarDia();
            }
        }

        window.guardarRutina = async function() {
            const btn = document.getElementById('btn-save-routine');
            const nombre = document.getElementById('routine-name').value;
            const asignado = document.getElementById('routine-assign').value;
            const fecha = document.getElementById('routine-date').value || null;

            if (!nombre.trim()) return alert("Por favor, asigna un Nombre del Bloque antes de guardar.");

            const blocksArray = [];
            document.querySelectorAll('.day-block').forEach(day => {
                const exercises = [];
                
                day.querySelectorAll('.exercise-row').forEach(row => {
                    const exeName = row.querySelector('.col-exercise').value;
                    if(exeName.trim() !== '') {
                        exercises.push({
                            exercise: exeName, 
                            video: row.querySelector('.col-video').value,
                            intensity: row.querySelector('.col-intensity').value,
                            reps: row.querySelector('.col-reps').value, 
                            rest: row.querySelector('.col-rest').value,
                            notes: row.querySelector('.col-notes').value
                        });
                    }
                });

                blocksArray.push({
                    day: day.querySelector('.day-title-input').value,
                    warmup: day.querySelector('.acondicionamiento-input').value, 
                    exercises: exercises
                });
            });

            btn.innerText = 'PROCESANDO...'; 
            btn.disabled = true;
            
            const payload = { 
                name: nombre, 
                assigned_to: asignado, 
                start_date: fecha, 
                blocks: blocksArray 
            };

            try {
                if (rutineEditId) {
                    const { error } = await dbClient.from('routines').update(payload).eq('id', rutineEditId);
                    if (error) throw error;
                    btn.innerText = '¡PLANIFICACIÓN ACTUALIZADA!';
                } else {
                    const { error } = await dbClient.from('routines').insert([payload]);
                    if (error) throw error;
                    btn.innerText = '¡PLANIFICACIÓN GUARDADA!';
                }
                
                btn.style.background = 'var(--success)';
                // Al guardar, redirecciona al gestor de planificaciones automáticamente
                setTimeout(() => window.location.href = 'planificacion.html', 1500);

            } catch (error) {
                console.error(error);
                btn.innerText = 'ERROR AL GUARDAR'; 
                btn.style.background = 'var(--danger)';
                setTimeout(() => { 
                    btn.innerText = 'GUARDAR PLANIFICACIÓN'; 
                    btn.style.background = ''; 
                    btn.disabled = false; 
                }, 3000);
            }
        }

        window.verHistorial = async function(btn) {
            const row = btn.closest('.exercise-row');
            const ejercicio = row.querySelector('.col-exercise').value;
            const atletaId = document.getElementById('routine-assign').value;

            if(!ejercicio.trim()) return alert("Debes escribir el nombre del ejercicio antes de buscar su historial.");
            if(atletaId === 'global') return alert("Selecciona a un atleta específico en el panel superior para ver su historial.");

            document.getElementById('historial-ejercicio-titulo').innerText = ejercicio;
            document.getElementById('historialModal').classList.add('active');
            
            const lista = document.getElementById('historial-lista');
            lista.innerHTML = '<div style="text-align:center; padding: 2rem; color: var(--text-muted);">Buscando récords...</div>';

            try {
                const { data, error } = await dbClient.from('personal_records')
                    .select('*')
                    .eq('user_id', atletaId)
                    .ilike('exercise', `%${ejercicio}%`)
                    .order('created_at', { ascending: false });
                
                if (data && data.length > 0) {
                    lista.innerHTML = data.map(pr => `
                        <div class="history-item">
                            <span class="history-date">${new Date(pr.created_at).toLocaleDateString()}</span>
                            <span class="history-data">
                                ${pr.weight}kg x ${pr.reps} reps 
                                <small style="color:var(--accent); margin-left:10px;">(Est 1RM: ${Math.round(pr.rm_calculated)}kg)</small>
                            </span>
                        </div>
                    `).join('');
                } else {
                    lista.innerHTML = '<div style="text-align:center; padding: 2rem; color: var(--text-muted);">El atleta aún no tiene marcas registradas para este movimiento.</div>';
                }
            } catch (error) {
                lista.innerHTML = '<div style="text-align:center; padding: 2rem; color: var(--danger);">Error conectando con el servidor.</div>';
            }
        }

        window.cerrarHistorial = () => {
            document.getElementById('historialModal').classList.remove('active');
        };
    </script>
</body>
</html>
